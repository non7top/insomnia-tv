name: Build ESP32-C3 Firmware

on:
  push:
    branches: [task/c3-build-and-flash]
  pull_request:
    branches: [task/c3-build-and-flash]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up PlatformIO
        run: pip install platformio

      - name: Build Firmware
        run: pio run -e esp32c3

      - name: Build Filesystem Image
        run: pio run -e esp32c3 -t buildfs

      - name: Extract version from INSOMNIATV_VERSION
        id: version
        run: |
          VERSION=$(grep 'INSOMNIATV_VERSION' platformio.ini | sed 's/.*\"\(.*\)\".*/\1/')
          echo "value=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload Firmware Artifact
        uses: actions/upload-artifact@v7
        with:
          name: insomniaTV-c3-firmware-${{ steps.version.outputs.value }}
          path: .pio/build/esp32c3/firmware.bin
          retention-days: 30

      - name: Upload Filesystem Artifact
        uses: actions/upload-artifact@v7
        with:
          name: insomniaTV-c3-filesystem-${{ steps.version.outputs.value }}
          path: .pio/build/esp32c3/littlefs.bin
          retention-days: 30

      - name: Generate Build Summary
        run: |
          echo "### ESP32-C3 Firmware Build Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.version.outputs.value }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Board:** ESP32-C3" >> $GITHUB_STEP_SUMMARY
          echo "**Partition Table:** min_spiffs.csv" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Artifacts are attached below!** 👇" >> $GITHUB_STEP_SUMMARY

      - name: PR Comment with Download Link
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const artifactUrl = `https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}`;
            const version = `${{ steps.version.outputs.value }}`;

            const mdVersion = version.replace(/`/g, '\`');
            const comment = '### 🚀 ESP32-C3 Firmware Ready\n\n' +
              '**Version:** `' + version + '`\n\n' +
              '**Download Artifacts:**\n' +
              '1. Go to [Actions Run #' + String(context.runId) + `](${artifactUrl})\n` +
              `2. Download \`insomniaTV-c3-firmware-${{ steps.version.outputs.value }}\`\n` +
              `3. Download \`insomniaTV-c3-filesystem-${{ steps.version.outputs.value }}\`\n\n` +
              '**Flash Instructions:**\n' +
              '```bash\n' +
              '# Flash firmware (offset 0x0)\n' +
              'esptool.py --chip esp32c3 --port /dev/ttyACM0 --baud 921600 write_flash 0x0 .pio/build/esp32c3/firmware.bin\n\n' +
              '# Flash filesystem (offset 0x3D0000, adjust for your partition table)\n' +
              'esptool.py --chip esp32c3 --port /dev/ttyACM0 --baud 921600 write_flash 0x3D0000 .pio/build/esp32c3/littlefs.bin\n' +
              '```';

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });

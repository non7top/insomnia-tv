; insomniaTV - ESP32 Smart IR Sleep Controller
; PlatformIO Project Configuration

[platformio]
default_envs = esp32dev
description = The cure for watching TV when you should be sleeping

; ---------------------------------------------------------------------------
; Global settings for all environments
; ---------------------------------------------------------------------------
[env]
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DINSOMNIATV_VERSION=\"0.1.0-dev\"
    -Wall
    -Wextra
    -Wno-unused-parameter

lib_deps =
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    me-no-dev/AsyncTCP @ ^1.0.3
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    marvinroger/AsyncMqttClient @ ^0.9.0
    bblanchon/ArduinoJson @ ^7.0.4
    WiFi
monitor_speed = 115200
test_framework = unity

; ---------------------------------------------------------------------------
; ESP32 production firmware target
; ---------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32 @ 6.13.0
board = esp32dev
framework = arduino
lib_deps =
    ${env.lib_deps}
    WiFi
lib_ignore = WebServer
build_flags =
    ${env.build_flags}
    -DARDUINO_ARCH_ESP32
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
upload_speed = 921600
monitor_speed = ${env.monitor_speed}
test_framework = ${env.test_framework}
test_ignore = test_*

; ---------------------------------------------------------------------------
; QEMU emulation target (for timing/scheduler validation)
; ---------------------------------------------------------------------------
[env:qemu-esp32]
extends = env:esp32dev
platform = espressif32 @ 6.13.0
board = esp32dev
upload_protocol = espota
lib_ignore = WebServer
build_flags =
    ${env:esp32dev.build_flags}
    -DINSOMNIATV_QEMU
test_framework = ${env.test_framework}
test_ignore = test_*

; ---------------------------------------------------------------------------
; ESP32-C3 production firmware target
; ---------------------------------------------------------------------------
[env:esp32c3]
platform = espressif32 @ 6.13.0
board = esp32-c3-devkitm-1
framework = arduino
platform_packages =
    toolchain-riscv32-esp @ 12.2.0+20230208
lib_deps =
    ${env.lib_deps}
    WiFi
lib_ignore = WebServer
build_flags =
    ${env.build_flags}
    -DARDUINO_ARCH_ESP32
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = ${env.monitor_speed}
test_framework = ${env.test_framework}
test_ignore = test_*

; ---------------------------------------------------------------------------
; Native desktop environment (unit tests, no ESP32 hardware)
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = ${env.test_framework}
lib_deps =
    https://github.com/eranpeer/FakeIt.git
    bblanchon/ArduinoJson @ ^7.0.4
    fabiobatsilva/ArduinoFake @ ^0.4.0
build_flags =
    ${env.build_flags}
    -DUNITY_INCLUDE_DOUBLE
    -DINSOMNIATV_NATIVE
    -std=c++17
    -ggdb
    --coverage
    -lgcov
test_build_src = true

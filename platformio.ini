; insomniaTV - ESP32 Smart IR Sleep Controller
; PlatformIO Project Configuration

[platformio]
default_envs = esp32dev
description = The cure for watching TV when you should be sleeping

; ---------------------------------------------------------------------------
; Common build flags shared across all environments
; ---------------------------------------------------------------------------
[common]
extra_scripts = pre:ccache_config.py
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DINSOMNIATV_VERSION=\"0.1.0-dev\"
    -Wall
    -Wextra
    -Wno-unused-parameter
lib_deps =
    crankyoldgit/IRremoteESP8266 @ ^2.8.6
    me-no-dev/AsyncTCP @ ^1.0.3
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    marvinroger/AsyncMqttClient @ ^0.9.0
    bblanchon/ArduinoJson @ ^7.0.4
    WiFi
monitor_speed = 115200
test_framework = unity

; ---------------------------------------------------------------------------
; ESP32 production firmware target
; ---------------------------------------------------------------------------
[env:esp32dev]
platform = espressif32 @ ^6.7.0
board = esp32dev
framework = arduino
lib_deps =
    ${common.lib_deps}
    WiFi
lib_ignore = WebServer
build_flags =
    ${common.build_flags}
    -DARDUINO_ARCH_ESP32
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
upload_speed = 921600
monitor_speed = ${common.monitor_speed}
test_framework = ${common.test_framework}
test_ignore = test_*

; ---------------------------------------------------------------------------
; QEMU emulation target (for timing/scheduler validation)
; ---------------------------------------------------------------------------
[env:qemu-esp32]
extends = env:esp32dev
platform = espressif32 @ ^6.7.0
board = esp32dev
upload_protocol = espota
lib_ignore = WebServer
build_flags =
    ${env:esp32dev.build_flags}
    -DINSOMNIATV_QEMU
test_framework = ${common.test_framework}
test_ignore = test_*

; ---------------------------------------------------------------------------
; Native desktop environment (unit tests, no ESP32 hardware)
; ---------------------------------------------------------------------------
[env:native]
platform = native
test_framework = ${common.test_framework}
lib_deps =
    ThrowTheSwitch/Unity @ ^2.6.0
    https://github.com/eranpeer/FakeIt.git
    bblanchon/ArduinoJson @ ^7.0.4
    fabiobatsilva/ArduinoFake @ ^0.4.0
build_flags =
    ${common.build_flags}
    -DUNITY_INCLUDE_DOUBLE
    -DINSOMNIATV_NATIVE
    -std=c++17
    -ggdb
    --coverage
    -lgcov
test_build_src = true

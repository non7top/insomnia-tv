; insomniaTV - ESP32 Smart IR Sleep Controller
; PlatformIO Project Configuration

[platformio]
default_envs = esp32c3
description = The cure for watching TV when you should be sleeping

; ---------------------------------------------------------------------------
; Global settings for all environments
; ---------------------------------------------------------------------------
[env]
framework = arduino
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38/platform-espressif32.zip
#platform_packages = tool-esptoolpy @ https://github.com/pioarduino/esptool/releases/download/v4.8.11/esptool.zip
build_flags =
  -Og
  -Wall -Wextra
  -Wno-unused-parameter
  -D CORE_DEBUG_LEVEL=ARDUHAL_LOG_LEVEL_VERBOSE
  ; -D CONFIG_ASYNC_TCP_MAX_ACK_TIME=5000
  ; -D CONFIG_ASYNC_TCP_PRIORITY=10
  -D CONFIG_ASYNC_TCP_QUEUE_SIZE=128
  -D CONFIG_ASYNC_TCP_RUNNING_CORE=1
  -D CONFIG_ASYNC_TCP_STACK_SIZE=4096
  -D INSOMNIATV_VERSION=\"0.1.0-dev\"
  -I${platformio.packages_dir}/framework-arduinoespressif32/cores/esp32
  -I${platformio.packages_dir}/framework-arduinoespressif32/libraries
  -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/Network/src
  -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/FS/src
  -I${platformio.packages_dir}/framework-arduinoespressif32/libraries/WiFi/src
#  -Wall
#  -Wextra
#  -Wno-unused-parameter
upload_protocol = esptool
monitor_speed = 115200
monitor_filters = esp32_exception_decoder, log2file
lib_compat_mode = soft
lib_ldf_mode = chain
lib_deps =
  crankyoldgit/IRremoteESP8266 @ 2.9.0
  ESP32Async/AsyncTCP @ 3.4.10
#  https://github.com/ESP32Async/AsyncTCP.git#main
  ESP32Async/ESpAsyncWebServer @ 3.11.0
custom_component_remove =
    espressif/esp_hosted
    espressif/esp_wifi_remote
    espressif/esp-dsp
    espressif/esp32-camera
    espressif/libsodium
    espressif/esp-modbus
    espressif/qrcode
    espressif/esp_insights
    espressif/esp_diag_data_store
    espressif/esp_diagnostics
    espressif/esp_rainmaker
    espressif/rmaker_common

custom_sdkconfig = CONFIG_LWIP_MAX_ACTIVE_TCP=32

test_framework = unity

; ---------------------------------------------------------------------------
; ESP32-C3 production firmware target
; ---------------------------------------------------------------------------
[env:esp32c3]
board = esp32-c3-devkitm-1
framework = arduino
lib_deps =
    ${env.lib_deps}
build_flags =
    ${env.build_flags}
    -DARDUINO_ARCH_ESP32
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -D IDF_CCACHE_ENABLE=1
board_build.filesystem = littlefs
board_build.partitions = min_spiffs.csv
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
monitor_speed = ${env.monitor_speed}
test_framework = ${env.test_framework}
test_ignore = test_*
build_ccache = true
build_cache_dir = .pio/build_cache

monitor_filters =
    esp32_exception_decoder
    time      ; Add timestamp with milliseconds for each new line

; ---------------------------------------------------------------------------
; ESP32-DevKit-C (standard ESP32) for compatibility testing
; ---------------------------------------------------------------------------
[env:esp32dev]
board = esp32dev
framework = arduino
lib_deps =
    ${env.lib_deps}
build_flags =
    ${env.build_flags}
    -DARDUINO_ARCH_ESP32
board_build.partitions = min_spiffs.csv
upload_port = /dev/ttyACM0
monitor_port = /dev/ttyACM0
test_framework = ${env.test_framework}
test_ignore = test_*
build_cache_dir = .pio/build_cache

monitor_filters =
    esp32_exception_decoder
    time

; ---------------------------------------------------------------------------
; QEMU ESP32 emulator for unit testing without hardware
; ---------------------------------------------------------------------------
[env:qemu-esp32]
board = qemu-esp32
framework = arduino
lib_deps =
    ${env.lib_deps}
build_flags =
    ${env.build_flags}
    -DARDUINO_ARCH_ESP32
test_framework = ${env.test_framework}
